<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Overlay</title>

<style>
  html, body { margin:0; padding:0; background:transparent; font-family:Arial,Helvetica,sans-serif; }
  body, body * { -webkit-text-stroke: 5px #000; paint-order: stroke fill; }
  .wrap{ display:inline-block; padding:10px 14px; }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap: 80px;   /* distanza tra le 2 colonne */
    align-items:start;
  }
  .col{ display:grid; row-gap: 26px; } /* distanza tra Try e Punti */
  .name-row{
    display:flex;
    align-items:center;
    margin-bottom:10px;
  }
  .name-input{
    padding: 0;
    background: transparent;
    color: #fff;
    font-size: 42px;
    font-weight: 800;
    line-height: 1.05;
    min-height: 1em;
    display: inline;
    white-space: nowrap;
    text-shadow:0 2px 6px rgba(0,0,0,.7);
    font-family: Arial,Helvetica,sans-serif;
    outline:none;
    caret-color:#fff;
    cursor:text;
    pointer-events:auto;
    box-shadow:none;
    font-variant-numeric: normal;
  }
  .name-input:focus,
  .name-input:focus-visible{
    outline: none;
  }

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    white-space:nowrap;
    color:#fff;
    font-weight:800;
    font-size:42px;
    line-height:1.05;
    text-shadow:0 2px 6px rgba(0,0,0,.7);
  }
  .left{ display:flex; align-items:baseline; gap:12px; }
  .label{ opacity:.95; }

  /* Valori editabili */
.value{
  width: 4ch;             
  text-align: left;
  font-variant-numeric: tabular-nums; 
  font-family: Consolas, monospace;   
  padding: 0 10px;
  border-radius: 10px;
  background: transparent;
}

  .value[contenteditable="true"]{
    outline:none;
    cursor:text;
  }
  .value.editing{
    background: transparent;
    box-shadow: none;
  }

  .controls{ display:flex; gap:8px; }
  button{
    appearance:none;
    border:0;
    border-radius:10px;
    padding:6px 10px;
    font-size:18px;
    font-weight:800;
    color:#fff;
    background:rgba(0,0,0,.35);
    cursor:pointer;
    line-height:1;
    text-shadow:0 2px 6px rgba(0,0,0,.5);
  }
  button:active{ transform:translateY(1px); }

  .ditto-stack{
    margin-top: 8px;
    display:grid;
    grid-template-columns: repeat(5, 80px);
    gap: 6px;
  }
  .ditto-stack img{
    width: 80px;
    height: 80px;
    justify-self:start;
    object-fit: contain;
    image-rendering: auto;
    pointer-events: none;
  }

  .count{
    min-width: 28px;
    text-align:center;
    color:#fff;
    font-weight:800;
    font-size:34px;
    text-shadow:0 2px 6px rgba(0,0,0,.7);
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="grid">
      <!-- SINISTRA -->
      <div class="col">
        <div class="name-row">
          <span id="nameL" class="name-input" data-key="nameL" contenteditable="true" tabindex="0" spellcheck="false">Nome sinistra</span>
        </div>
        <div class="row">
          <div class="left">
            <span class="label">Try:</span>
            <span class="value" id="tryX" contenteditable="true" data-key="tryX">0</span>
          </div>
          <div class="controls">
            <button data-action="add" data-key="tryX" data-delta="-1">-</button>
            <button data-action="add" data-key="tryX" data-delta="1">+</button>
          </div>
        </div>

        <div class="row">
          <div class="left">
            <span class="label">Punti:</span>
            <span class="value" id="puntiY" contenteditable="true" data-key="puntiY">0</span>
          </div>
          <div class="controls">
            <button data-action="add" data-key="puntiY" data-delta="-5">-5</button>
            <button data-action="add" data-key="puntiY" data-delta="5">+5</button>
            <button data-action="add" data-key="puntiY" data-delta="-10">-10</button>
            <button data-action="add" data-key="puntiY" data-delta="10">+10</button>
          </div>
        </div>

        <div class="row">
          <div class="left">
            <span class="label">Media:</span>
            <span class="value" id="mediaL">0</span>
          </div>
        </div>

        <div class="ditto-stack" id="dittoListL" data-key="dittoL"></div>
        <div class="row">
          <div class="left">
            <span class="label">Ditto:</span>
            <button data-action="ditto" data-key="dittoL" data-delta="-1">-</button>
            <span class="count" id="dittoL" data-key="dittoL">0</span>
            <button data-action="ditto" data-key="dittoL" data-delta="1">+</button>
          </div>
        </div>
      </div>

      <!-- DESTRA -->
      <div class="col">
        <div class="name-row">
          <span id="nameR" class="name-input" data-key="nameR" contenteditable="true" tabindex="0" spellcheck="false">Nome destra</span>
        </div>
        <div class="row">
          <div class="left">
            <span class="label">Try:</span>
            <span class="value" id="tryZ" contenteditable="true" data-key="tryZ">0</span>
          </div>
          <div class="controls">
            <button data-action="add" data-key="tryZ" data-delta="-1">-</button>
            <button data-action="add" data-key="tryZ" data-delta="1">+</button>
          </div>
        </div>

        <div class="row">
          <div class="left">
            <span class="label">Punti:</span>
            <span class="value" id="puntiA" contenteditable="true" data-key="puntiA">0</span>
          </div>
          <div class="controls">
            <button data-action="add" data-key="puntiA" data-delta="-5">-5</button>
            <button data-action="add" data-key="puntiA" data-delta="5">+5</button>
            <button data-action="add" data-key="puntiA" data-delta="-10">-10</button>
            <button data-action="add" data-key="puntiA" data-delta="10">+10</button>
          </div>
        </div>

        <div class="row">
          <div class="left">
            <span class="label">Media:</span>
            <span class="value" id="mediaR">0</span>
          </div>
        </div>

        <div class="ditto-stack" id="dittoListR" data-key="dittoR"></div>
        <div class="row">
          <div class="left">
            <span class="label">Ditto:</span>
            <button data-action="ditto" data-key="dittoR" data-delta="-1">-</button>
            <span class="count" id="dittoR" data-key="dittoR">0</span>
            <button data-action="ditto" data-key="dittoR" data-delta="1">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // INCOLLA QUI LA TUA CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyAwZgKmhSvknOds6Ft6CM41ak3kR4U-88E",
    authDomain: "bennyghei.firebaseapp.com",
    databaseURL: "https://bennyghei-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "bennyghei",
    storageBucket: "bennyghei.firebasestorage.app",
    messagingSenderId: "867415998756",
    appId: "1:867415998756:web:f9aaac9ebad1612e2d33b1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const scoreRef = ref(db, "score");

  const keys = ["tryX","puntiY","tryZ","puntiA","nameL","nameR","dittoL","dittoR"];
  const numericKeys = new Set(["tryX","puntiY","tryZ","puntiA","dittoL","dittoR"]);
  const textKeys = new Set(["nameL","nameR"]);

  const els = Object.fromEntries(keys.map(k => [k, document.getElementById(k)]));
  const mediaEls = {
    left: document.getElementById("mediaL"),
    right: document.getElementById("mediaR"),
  };
  const dittoStacks = {
    dittoL: document.getElementById("dittoListL"),
    dittoR: document.getElementById("dittoListR"),
  };

  function buildDittoImageList(container, count){
    const n = Math.max(0, toInt(count));
    container.innerHTML = "";
    for(let i=0; i<n; i++){
      const img = document.createElement("img");
      img.src = "ditto.png";
      img.alt = "ditto";
      img.loading = "eager";
      container.appendChild(img);
    }
  }

  function toInt(x){
    const n = parseInt(String(x).replace(/[^\d-]/g,""), 10);
    return Number.isFinite(n) ? n : 0;
  }

  function calcMedia(points, tries){
    const p = toInt(points);
    const t = toInt(tries);
    if(t <= 0) return "0";
    const value = p / t;
    return Number.isInteger(value) ? String(value) : value.toFixed(2).replace(/\.?0+$/, "");
  }

  async function ensureInit(){
    const snap = await get(scoreRef);
    if(!snap.exists()){
      await set(scoreRef, {
        tryX:0, puntiY:0, tryZ:0, puntiA:0,
        nameL:"", nameR:"",
        dittoL:0, dittoR:0
      });
    }
  }

  async function writeAll(next){
    await set(scoreRef, {
      tryX: toInt(next.tryX),
      puntiY: toInt(next.puntiY),
      tryZ: toInt(next.tryZ),
      puntiA: toInt(next.puntiA),
      nameL: String(next.nameL ?? ""),
      nameR: String(next.nameR ?? ""),
      dittoL: toInt(next.dittoL),
      dittoR: toInt(next.dittoR)
    });
  }

  // Aggiorna UI quando cambia in Firebase (ma NON sovrascrivere mentre stai editando)
  onValue(scoreRef, (snap)=>{
    if(!snap.exists()) return;
    const d = snap.val();
    for(const k of keys){
      const el = els[k];
      if(!el) continue;
      const val = d?.[k] ?? "";

      if(textKeys.has(k)){
        if(el.classList.contains("editing")) continue;
        const fallback = k === "nameL" ? "Nome sinistra" : "Nome destra";
        const text = String(val ?? "").trim();
        el.textContent = text || fallback;
        continue;
      }

      if(el.classList.contains("editing")) continue; // non disturbare chi scrive
      el.textContent = toInt(val ?? 0);
    }

    mediaEls.left.textContent = calcMedia(d?.puntiY ?? 0, d?.tryX ?? 0);
    mediaEls.right.textContent = calcMedia(d?.puntiA ?? 0, d?.tryZ ?? 0);

    buildDittoImageList(dittoStacks.dittoL, toInt(d?.dittoL ?? 0));
    buildDittoImageList(dittoStacks.dittoR, toInt(d?.dittoR ?? 0));
  });

  // Bottoni +/- con delta
  document.addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-action='add']");
    if(!btn) return;

    const key = btn.dataset.key;
    const delta = toInt(btn.dataset.delta);

    const snap = await get(scoreRef);
    const cur = snap.exists() ? snap.val() : { tryX:0, puntiY:0, tryZ:0, puntiA:0 };
    const next = { ...cur, [key]: toInt(cur[key]) + delta };

    await writeAll(next);
  });

  document.addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-action='ditto']");
    if(!btn) return;

    const key = btn.dataset.key;
    const delta = toInt(btn.dataset.delta);
    const pointsKey = key === "dittoL" ? "puntiY" : "puntiA";

    const snap = await get(scoreRef);
    const cur = snap.exists() ? snap.val() : { tryX:0, puntiY:0, tryZ:0, puntiA:0, nameL:"", nameR:"", dittoL:0, dittoR:0 };
    const current = toInt(cur[key]);
    const nextVal = Math.max(0, current + delta);
    const appliedDelta = nextVal - current;
    const nextPoints = toInt(cur[pointsKey]) + (appliedDelta * 50);
    const next = { ...cur, [key]: nextVal, [pointsKey]: nextPoints };

    await writeAll(next);
  });

  // Edit manuale: Enter = salva, Esc = annulla, blur = salva
  function commit(el){
    el.classList.remove("editing");
    const key = el.dataset.key;
    const isText = textKeys.has(key);
    const val = isText ? String(el.textContent ?? "") : toInt(el.textContent);
    if(!el.isContentEditable && !isText){
      el.textContent = val;
    }

    // leggi stato corrente e aggiorna solo quel campo (scrivendo comunque tutti)
    get(scoreRef).then(snap => {
      const cur = snap.exists() ? snap.val() : { tryX:0, puntiY:0, tryZ:0, puntiA:0 };
      const next = { ...cur, [key]: val };
      return writeAll(next);
    });
  }

  function cancel(el){
    el.classList.remove("editing");
    // ripristina dal db
    get(scoreRef).then(snap => {
      const cur = snap.exists() ? snap.val() : {};
      const key = el.dataset.key;
      el.textContent = textKeys.has(key) ? String(cur?.[key] ?? "") : toInt(cur?.[key] ?? 0);
    });
  }

  keys.forEach(k=>{
    const el = els[k];
    if(!el) return;

    el.addEventListener("focus", ()=> el.classList.add("editing"));
    el.addEventListener("blur", ()=> commit(el));

    el.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){ e.preventDefault(); el.blur(); }   // salva
      if(e.key === "Escape"){ e.preventDefault(); cancel(el); el.blur(); } // annulla
    });

    el.addEventListener("paste", (e)=>{
      const key = el.dataset.key;
      if(!numericKeys.has(key)) return;
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData("text");
      document.execCommand("insertText", false, String(text).replace(/\s+/g," ").trim());
    });
  });

  ensureInit();
</script>
</body>
</html>
